<title>Dashboard Jurídico v2 — H.A. Advocacia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--pm:#378ADD;--pm-bg:#E6F1FB;--pm-t:#042C53;--pm-m:#0C447C;--pm-l:#85B7EB;
--ps:#D85A30;--ps-bg:#FAECE7;--ps-t:#712B13;--ps-m:#993C1D;--ps-l:#F0997B;
--jr:#7F77DD;--jr-bg:#EEEDFE;--jr-t:#3C3489;--jr-m:#534AB7;--jr-l:#AFA9EC;
--ct:#1D9E75;--ct-bg:#E1F5EE;--ct-t:#085041;--ct-m:#0F6E56;--ct-l:#5DCAA5;
--dn:#E24B4A;--dn-bg:#FCEBEB;--dn-t:#791F1F;
--wn:#EF9F27;--wn-bg:#FAEEDA;--wn-t:#854F0B;
--ok:#639922;--ok-bg:#EAF3DE;--ok-t:#27500A;
--pk:#D4537E;--pk-bg:#FBEAF0;--pk-t:#72243E;
--pj:#8B5CF6;--pj-bg:#F3F0FF;--pj-t:#4C1D95;--pj-m:#6D28D9;
--gr:#888780;--gr-bg:#F1EFE8;--gr-t:#444441;
--bd:#E7E5E4;--cb:#F7F7F6;--t1:#1C1917;--t2:#78716C;--t3:#A8A29E;--bg:#FAFAF9
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);padding:0;max-width:1100px;margin:0 auto;font-size:13px;line-height:1.5}
.hdr{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--bd);padding:10px 14px 0}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.logo{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#378ADD,#8B5CF6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.hdr h1{font-size:16px;font-weight:700}
.hdr h1 span{font-size:11px;font-weight:500;color:var(--ok);margin-left:6px}
.hdr p{font-size:11px;color:var(--t2)}
.hdr-actions{margin-left:auto;display:flex;gap:6px}
.btn-export{background:var(--ct);color:#fff;border:none;border-radius:6px;padding:6px 10px;font-size:11px;font-weight:600;cursor:pointer}
.btn-export:hover{background:var(--ct-m)}
.tabs{display:flex;gap:0;border-bottom:none;overflow-x:auto;flex-wrap:wrap}
.tab{padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--t3);border-bottom:3px solid transparent;display:flex;align-items:center;gap:5px;white-space:nowrap}
.tab:hover{color:var(--t1);background:var(--cb)}
.tab.active{border-bottom-color:var(--accent);color:var(--accent)}
.tab .cnt{font-size:10px;font-weight:600;padding:1px 6px;border-radius:8px;background:var(--tab-bg);color:var(--tab-c)}
.tab.danger .cnt{background:var(--dn-bg);color:var(--dn-t)}
.content{padding:12px 14px 40px;display:none}
.content.active{display:block}
.section-title{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin:14px 0 6px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--bd)}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:10px}
.mc{background:var(--cb);border-radius:8px;padding:10px 12px;border-left:3px solid var(--c,var(--gr))}
.mc.danger{background:var(--dn-bg);border-color:var(--dn)}
.mc.warn{background:var(--wn-bg);border-color:var(--wn)}
.mc.ok{background:var(--ok-bg);border-color:var(--ok)}
.mc.info{background:var(--pm-bg);border-color:var(--pm)}
.mc.judicial{background:var(--jr-bg);border-color:var(--jr)}
.mc label{font-size:10px;color:var(--t2);font-weight:600;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.3px}
.mc .val{font-size:22px;font-weight:700;line-height:1}
.mc .sub{font-size:10px;color:var(--t2);margin-top:3px}

.species-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:12px}
.sc{padding:10px 12px;border-radius:8px;border-left:3px solid var(--c);cursor:pointer;transition:transform .15s, box-shadow .15s;background:var(--bg-c)}
.sc:hover{transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,0.08)}
.sc.active{box-shadow:0 0 0 2px var(--c)}
.sc-label{font-size:11px;font-weight:600;color:var(--t-c);margin-bottom:3px}
.sc-val{font-size:20px;font-weight:700;color:var(--t-c);line-height:1}
.sc-bar{height:4px;background:rgba(0,0,0,0.08);border-radius:2px;margin-top:6px;overflow:hidden}
.sc-bar-fill{height:100%;background:var(--c);transition:width .4s}
.sc-sub{font-size:9px;color:var(--t-c);margin-top:3px;opacity:0.8}

.card{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:12px 14px;margin-bottom:10px}
.card-title{font-size:11px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:0.3px;text-align:center;margin-bottom:8px}
.hbar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.hbar-label{width:140px;text-align:right;font-size:11px;color:var(--t2);flex-shrink:0;font-weight:500}
.hbar-track{flex:1;background:#ECEBE9;border-radius:3px;height:16px;position:relative;overflow:hidden}
.hbar-fill{height:100%;border-radius:3px;display:flex;align-items:center;justify-content:flex-end;padding-right:5px;color:#fff;font-size:10px;font-weight:700;min-width:0}
.hbar-num{width:30px;text-align:right;font-size:11px;font-weight:600}

.stacked-row{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.stacked-row-header{display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px}
.stacked-row-label{font-weight:600}
.stacked-row-total{color:var(--t2)}
.stacked-bar{display:flex;height:20px;border-radius:4px;overflow:hidden;background:#ECEBE9}
.stacked-seg{display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:600;min-width:0;cursor:default}
.stacked-seg[title]:hover{filter:brightness(1.1)}
.legend{display:flex;gap:8px;font-size:10px;color:var(--t2);margin-top:6px;flex-wrap:wrap;justify-content:center}
.legend-item{display:flex;align-items:center;gap:3px}
.legend-dot{width:9px;height:9px;border-radius:2px;display:inline-block}

table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
thead{background:var(--cb)}
th{padding:6px 8px;text-align:left;font-weight:600;color:var(--t2);font-size:10px;text-transform:uppercase;letter-spacing:0.3px;border-bottom:1px solid var(--bd)}
td{padding:6px 8px;border-bottom:1px solid var(--bd)}
tr:hover{background:var(--cb)}
.type-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px}
.badge-pamt{background:var(--pm-bg);color:var(--pm-m)}
.badge-psdd{background:var(--ps-bg);color:var(--ps-t)}
.badge-judicial{background:var(--jr-bg);color:var(--jr-t)}
.deadline-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;display:inline-block}
.dl-vencido{background:var(--dn);color:#fff}
.dl-proximo{background:var(--wn);color:#fff}
.dl-ok{background:var(--pm-bg);color:var(--pm-m)}
.dl-neutro{background:var(--gr-bg);color:var(--gr-t)}

.month-bars{display:flex;align-items:flex-end;gap:10px;height:140px;margin:8px 0}
.month-bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.month-bar-val{font-size:11px;font-weight:700;color:var(--t1)}
.month-bar-fill{width:100%;background:var(--pm);border-radius:4px 4px 0 0;transition:opacity .2s;position:relative;display:flex;align-items:flex-end;justify-content:center}
.month-bar-fill:hover{opacity:0.85}
.month-bar-current{background:var(--jr)}
.month-bar-label{font-size:10px;color:var(--t2);font-weight:500}

.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;padding:6px 8px;background:var(--cb);border-radius:6px}
.filter-chip{font-size:10px;padding:3px 8px;border-radius:12px;background:#fff;border:1px solid var(--bd);cursor:pointer;color:var(--t2);font-weight:500}
.filter-chip.active{background:var(--pm);color:#fff;border-color:var(--pm)}
.filter-chip:hover{border-color:var(--pm)}

.empty-state{text-align:center;padding:20px;color:var(--t3);font-size:12px}
.color-blue{--c:var(--pm);--bg-c:var(--pm-bg);--t-c:var(--pm-t)}
.color-coral{--c:var(--ps);--bg-c:var(--ps-bg);--t-c:var(--ps-t)}
.color-purple{--c:var(--jr);--bg-c:var(--jr-bg);--t-c:var(--jr-t)}
.color-teal{--c:var(--ct);--bg-c:var(--ct-bg);--t-c:var(--ct-t)}
.color-pink{--c:var(--pk);--bg-c:var(--pk-bg);--t-c:var(--pk-t)}
.color-amber{--c:var(--wn);--bg-c:var(--wn-bg);--t-c:var(--wn-t)}
.color-red{--c:var(--dn);--bg-c:var(--dn-bg);--t-c:var(--dn-t)}
.color-green{--c:var(--ok);--bg-c:var(--ok-bg);--t-c:var(--ok-t)}
.color-gray{--c:var(--gr);--bg-c:var(--gr-bg);--t-c:var(--gr-t)}

.summary-note{font-size:11px;color:var(--t2);background:var(--cb);padding:8px 12px;border-radius:6px;border-left:3px solid var(--pm);margin-bottom:10px}
.summary-note strong{color:var(--t1);font-weight:600}

@media(max-width:600px){
.hbar-label{width:80px;font-size:9px}
.month-bars{height:100px}
.metrics-grid{grid-template-columns:repeat(2,1fr)}
.species-grid{grid-template-columns:repeat(2,1fr)}
th,td{padding:4px 5px;font-size:10px}
}
</style>

const lc = v => (v||"").toString().toLowerCase().trim();
const has = (v, ...kw) => { const s = lc(v); return kw.some(k => s.includes(k)); };
const isSim = v => has(v,"sim");
const tasks = DATA.filter(t => t.n);
const tipo = t => lc(t.tp||"");
const isPM = t => has(tipo(t),"pamt","multa");
const isPS = t => has(tipo(t),"psdd","suspens");
const isJD = t => has(tipo(t),"judicial");
const isADM = t => isPM(t) || isPS(t);
const st = t => lc(t.st||"");
const stH = (t,...kw) => { const s = st(t); return kw.some(k => s.includes(lc(k))); };

// Normaliza órgão
function normOrg(v) {
    const s = lc(v);
    if(!v||!s||s==="nan") return "Sem órgão";
    if(s.includes("amc")) return "AMC Fortaleza";
    if(s.includes("detran")&&(s.includes("-ce")||s.includes("- ce"))) return "DETRAN/CE";
    if(s.includes("detran")&&s.includes("sp")) return "DETRAN-SP";
    if(s.includes("detran")&&s.includes("rn")) return "DETRAN-RN";
    if(s.includes("detran")&&s.includes("pi")) return "DETRAN-PI";
    if(s.includes("detran")&&s.includes("pb")) return "DETRAN-PB";
    if(s.includes("detran")&&s.includes("pe")) return "DETRAN-PE";
    if(s.includes("detran")) return "Outros DETRANs";
    if(s.includes("prf")) return "PRF";
    if(s.includes("demutran")) return "DEMUTRAN";
    if(s.includes("pref")) return "Prefeituras";
    if(s.includes("dnit")) return "DNIT";
    if(s.includes("der")) return "DER-SP";
    return v;
}

// Normaliza infração ADM por ESPÉCIE
function normEspecieADM(t) {
    const inf = lc(t.inf||"");
    if(!inf||inf==="nan") return "Sem espécie";
    if(inf.includes("recusa")||inf.includes("bafômetro")||inf.includes("bafometro")||inf.includes("alcool")||inf.includes("influên")) return "Lei Seca";
    if(inf.includes("capacete")) return "Sem Capacete";
    if(inf.includes("manobra")) return "Manobra Perigosa";
    if(inf.includes("arrancada")) return "Arrancada Brusca";
    if(inf.includes("velocidade")||inf.includes("50%")) return "Velocidade +50%";
    if(inf.includes("forç")||inf.includes("forc")||inf.includes("passagem")) return "Forçar Passagem";
    if(inf.includes("estacion")||inf.includes("vaga")) return "Estacionamento";
    if(inf.includes("ultrapass")) return "Ultrapassar Contramão";
    if(inf.includes("desobedecer")) return "Desobedecer Agente";
    if(inf.includes("cnh")||inf.includes("licenciamento")||inf.includes("vencid")) return "CNH/Licenciamento";
    if(inf.includes("indicação")||inf.includes("indicac")) return "Indicação de Condutor";
    if(inf.includes("7455")) return "Sem Categoria (7455)";
    return "Outras infrações";
}

// Normaliza espécie judicial pela coluna 'pjt' (Tema Central)
function normEspeciePJ(t) {
    const pjt = lc(t.pjt||"");
    if(!pjt||pjt==="nan") return "Sem tema";
    if(pjt.includes("transferencia") && pjt.includes("pontos")) return "Transf. Pontos + PPD";
    if(pjt.includes("transferência retroativa")||pjt.includes("transferencia retroativa")) return "Transf. Retroativa Veículo";
    if(pjt.includes("anulatoria") && pjt.includes("multa")) return "Anulatória Multa";
    if(pjt.includes("anulatoria") && pjt.includes("psdd")) return "Anulatória PSDD";
    if(pjt.includes("mandado")) return "Mandado de Segurança";
    if(pjt.includes("cumprimento")) return "Cumprimento Sentença";
    if(pjt.includes("obtencao") || pjt.includes("obtenção")) return "Obtenção CNH";
    if(pjt.includes("abstencao") || pjt.includes("abstenção")) return "Abstenção PSDD";
    if(pjt.includes("reativar")) return "Reativar CNH";
    if(pjt === "outro") return "Outros temas";
    return pjt.charAt(0).toUpperCase() + pjt.slice(1);
}

// CÁLCULOS

const adm = tasks.filter(isADM);
const pm = tasks.filter(isPM);
const ps = tasks.filter(isPS);
const jd = tasks.filter(isJD);

// Prazos
function parsePrazo(t) {
    if(!t.pr) return null;
    const d = new Date(t.pr);
    return isNaN(d) ? null : d;
}
function diasAteHoje(d) {
    if(!d) return null;
    return Math.ceil((d - today) / 86400000);
}

const prazosAdm = adm.map(t => ({...t, _pd:parsePrazo(t), _dias:diasAteHoje(parsePrazo(t))}));
const prazosJd = jd.map(t => ({...t, _pd:parsePrazo(t), _dias:diasAteHoje(parsePrazo(t))}));
const prazosAll = [...prazosAdm, ...prazosJd];

const abertos = prazosAll.filter(t => t._dias !== null && t._dias >= 0);
const atrasados = prazosAll.filter(t => t._dias !== null && t._dias < 0);

// Espécies ADM e contagens
const especiesAdm = {};
adm.forEach(t => {
    const e = normEspecieADM(t);
    if(!especiesAdm[e]) especiesAdm[e] = {total:0, dp:0, jari:0, cetran:0, vit:0, arq:0, items:[]};
    especiesAdm[e].total++;
    especiesAdm[e].items.push(t);
    if(stH(t,"01-","defesa prévia","defesa previa")) especiesAdm[e].dp++;
    if(stH(t,"02-","aguardando julgamento dp","aguardando dp")) especiesAdm[e].dp++;
    if(stH(t,"03-","recurso jari","04-","aguardando jari")) especiesAdm[e].jari++;
    if(stH(t,"05-","recurso cetran","06-","aguardando cetran")) especiesAdm[e].cetran++;
    if(stH(t,"07-","vitória","vitoria","sentença procedente")) especiesAdm[e].vit++;
    if(stH(t,"08-","arquivado","encerrado","sentença improcedente")) especiesAdm[e].arq++;
});

// Espécies Judiciais
const especiesPj = {};
jd.forEach(t => {
    const e = normEspeciePJ(t);
    if(!especiesPj[e]) especiesPj[e] = {total:0, conf:0, prot:0, lim:0, sent:0, cump:0, items:[]};
    especiesPj[e].total++;
    especiesPj[e].items.push(t);
    if(stH(t,"01","confecção","confeccao","p. inicial") && !t.pjn) especiesPj[e].conf++;
    if(t.pjn) especiesPj[e].prot++;
    if(isSim(t.p6)) especiesPj[e].lim++;
    if(stH(t,"sentença procedente","sentença improcedente") || t.p11) especiesPj[e].sent++;
    if(isSim(t.p13)) especiesPj[e].cump++;
});

// Funis
const funilAdm = {
    "DP — PAMT": pm.filter(t => stH(t,"01-","defesa prévia") || stH(t,"02-","aguardando julgamento dp")).length,
    "DP — PSDD": ps.filter(t => stH(t,"01-","defesa prévia") || stH(t,"02-","aguardando")).length,
    "Recurso JARI": adm.filter(t => stH(t,"03-","recurso jari","04-","aguardando jari")).length,
    "Recurso CETRAN": adm.filter(t => stH(t,"05-","recurso cetran","06-","aguardando cetran")).length,
    "Vitória": adm.filter(t => stH(t,"07-","vitória","vitoria")).length,
    "Arquivado": adm.filter(t => stH(t,"08-","arquivado","encerrado")).length
};
const funilJd = {
    "Confecção P. Inicial": jd.filter(t => stH(t,"confecção","confeccao","p. inicial") && !t.pjn).length,
    "Protocolada": jd.filter(t => t.pjn).length,
    "Liminar deferida": jd.filter(t => isSim(t.p6)||has(t.p6,"deferid")).length,
    "Sentença": jd.filter(t => stH(t,"sentença procedente","sentença improcedente")).length,
    "Cumprida/Finalizada": jd.filter(t => isSim(t.p13)).length
};

// Mensal
const meses = ["Dezembro","Janeiro","Fevereiro","Marco","Abril","Maio"];
const mensalAdm = {};
const mensalJd = {};
meses.forEach(m => {
    mensalAdm[m] = adm.filter(t => t.m === m).length;
    mensalJd[m] = jd.filter(t => t.m === m).length;
});

// Produzidos vs A Produzir (apuração)
const judProduzidos = jd.filter(t => t.pjn).length;
const judConfP3 = 3; // Jeferson Alves, Moises Almeida, Gabriel da Silva (em produção parada)
const judRescindidos = jd.filter(t => has(t.pjs,"rescindido")).length;
const judSemP3 = jd.length - judProduzidos - judConfP3 - judRescindidos;

function renderEspeciesGrid(especies, corMap, tipo) {
    const sorted = Object.entries(especies).sort((a,b) => b[1].total - a[1].total);
    const max = Math.max(...sorted.map(([,v]) => v.total), 1);
    return `<div class="species-grid">${sorted.map(([nome, dados]) => {
        const cor = corMap[nome] || "color-gray";
        const pct = (dados.total / max) * 100;
        const subInfo = tipo === 'adm' 
            ? `${dados.dp} em DP · ${dados.jari} JARI · ${dados.vit} vit.`
            : `${dados.conf} produção · ${dados.prot} protoc. · ${dados.sent} sent.`;
        return `<div class="sc ${cor}" onclick="filtrarPorEspecie('${tipo}','${nome.replace(/'/g,"\\'")}')">
<div class="sc-label">${nome}</div>
<div class="sc-val">${dados.total}</div>
<div class="sc-bar"><div class="sc-bar-fill" style="width:${pct}%"></div></div>
<div class="sc-sub">${subInfo}</div>
</div>`;
    }).join('')}</div>`;
}

            {key:'lim', label:'Liminar', color:'#534AB7'},
            {key:'sent', label:'Sentença', color:'#1D9E75'},

</div>`;
    }
}

}

• Prazos atrasados: ${atrasados.length} · Prazos em aberto: ${abertos.length}

</div>`;
}

app.innerHTML = renderHeader() + renderAdm() + renderPj() + renderAbertos() + renderAtrasados() + renderProduzidos() + renderMensal();

function switchTab(t) {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.content').forEach(x => x.classList.remove('active'));
    document.getElementById('tab-' + t).classList.add('active');
    document.getElementById('content-' + t).classList.add('active');
}

function filtrarPorEspecie(tipo, especie) {
    const items = tipo === 'adm' ? adm : jd;
    let filtered;
    if(especie === 'TODOS') filtered = items;
    else filtered = items.filter(t => {
        const e = tipo === 'adm' ? normEspecieADM(t) : normEspeciePJ(t);
        return e === especie;
    });
    const tableId = 'tabela-' + tipo;
    const el = document.getElementById(tableId);
    if(el) el.innerHTML = renderTabela(filtered.slice(0,500), tipo === 'adm');
    // Atualizar chips
    const fb = document.getElementById('filter-' + tipo);
    if(fb) {
        fb.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        const chips = fb.querySelectorAll('.filter-chip');
        chips.forEach(c => { if(c.textContent.includes(especie === 'TODOS' ? 'Todos' : especie)) c.classList.add('active'); });
    }
}

function exportXLSX() {
    // Exporta CSV simples (suportado pelo Excel)
    let csv = "Mês;Cliente;Tipo;Espécie;Órgão;Status;Processo;Prazo\n";
    tasks.forEach(t => {
        const tipoLabel = isJD(t) ? 'Judicial' : isPS(t) ? 'PSDD' : 'PAMT';
        const especie = isJD(t) ? normEspeciePJ(t) : normEspecieADM(t);
        const linha = [
            t.m || '',
            (t.n || '').replace(/;/g, ','),
            tipoLabel,
            especie,
            normOrg(t.og || ''),
            (t.st || '').replace(/;/g, ','),
            t.pjn || '',
            t.pr || ''
        ].join(';');
        csv += linha + "\n";
    });
    const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], {type: 'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `dashboard-juridico-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
}
